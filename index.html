  :root {
    --bg: #0B0E16;
    --lamp: #E7B364;
    --lamp-dim: #7A5E33;

  * { box-sizing: border-box; }

  html, body {

    padding: 0;
    background: var(--bg);

  }

  body {

  }

  button { font-family: inherit; }
  button:hover { opacity: 0.85; }

  .screen {
    position: relative;
    min-height: 100vh;
    overflow: hidden;
  }

  .lamp {
    position: absolute;
    border-radius: 50%;
    filter: blur(2px);
    animation: breathe 5s ease-in-out infinite;
    pointer-events: none;
    left: 50%;
    background: radial-gradient(circle, var(--lamp)55 0%, var(--lamp)22 35%, transparent 70%);
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.08); }
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
  }

  .container.wide {
    max-width: 620px;
  }

  .category-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    position: relative;
  }

  .hamburger-btn {
    background: transparent;
    border: 1px solid var(--hairline);
    border-radius: 6px;
    padding: 10px 12px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 4px;
    justify-content: center;
  }

  .hamburger-btn span {
    width: 18px;
    height: 2px;
    background: var(--text-dim);
    display: block;
    border-radius: 1px;
  }

  .current-category {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--lamp);
  }

  .category-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    margin-top: 8px;
    background: #121628;
    border: 1px solid var(--hairline);
    border-radius: 8px;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 150px;
    z-index: 20;
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.45);
  }

  .category-dropdown.hidden {
    display: none;
  }

  .category-btn {
    background: transparent;
    border: none;
    text-align: left;
    padding: 10px 12px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 6px;
    width: 100%;
  }

  .category-btn.active {
    color: var(--lamp);
    background: rgba(231, 179, 100, 0.1);
  }

  /* ---- Home screen ---- */
  #home-screen { padding: 48px 24px 64px; }

  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.25em;
    color: var(--lamp);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Noto Serif TC', serif;
    font-weight: 600;
    font-size: 32px;
    color: var(--text);
    margin: 0 0 6px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin: 0 0 40px;
    line-height: 1.7;
  }

  .song-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .song-item {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--hairline);
    padding: 20px 4px;

  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--lamp);
    box-shadow: 0 0 10px 2px rgba(231, 179, 100, 0.53);

  .song-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 19px;
    font-weight: 500;
    color: var(--text);
  }

  .play-hint {
    margin-left: auto;
    font-size: 12px;
    color: var(--slate);
  }

  .footnote {
    margin-top: 40px;
    font-size: 12px;
    color: var(--slate);
    line-height: 1.8;
  }

  .pagination {

    align-items: center;

    gap: 18px;
    margin-top: 32px;
  }

  .page-btn {
    background: transparent;
    border: 1px solid var(--hairline);
    color: var(--text-dim);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;

  }

    color: var(--lamp);

  }

  .back-btn {
    background: transparent;
    border: none;
    color: var(--slate);
    font-size: 13px;
    letter-spacing: 0.05em;

    font-size: 30px;
    color: var(--text);
    margin: 0 0 24px;

  .player-wrap {
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--hairline);
    margin-bottom: 36px;

  .player-wrap iframe {
    display: block;
    border: none;

    height: 80px;
  }

  .divider {

    align-items: center;
    gap: 12px;
    margin: 0 0 24px;
  }

    flex: 1;
    height: 1px;
    background: var(--hairline);
  }

  .divider .label {
    font-size: 12px;
    letter-spacing: 0.2em;

  .lyrics {

    flex-direction: column;
    gap: 26px;
  }

  .section-tag {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--lamp-dim);
    text-transform: uppercase;
    margin-bottom: 8px;

  const homeScreen = document.getElementById("home-screen");
  const detailScreen = document.getElementById("detail-screen");
  const songListEl = document.getElementById("song-list");
  const paginationEl = document.getElementById("pagination");
  const categoryListEl = document.getElementById("category-list");
  const hamburgerBtn = document.getElementById("hamburger-btn");
  const currentCategoryLabel = document.getElementById("current-category-label");
  const detailTitleEl = document.getElementById("detail-title");
  const playerFrame = document.getElementById("player-frame");
  const lyricsEl = document.getElementById("lyrics");
  const backBtn = document.getElementById("back-btn");

  const CATEGORIES = ["其他", "Z-ONE"];
  const SONGS_PER_PAGE = 8;
  let currentPage = 1;
  let currentCategory = CATEGORIES[0];

  function getFilteredSongs() {
    return songs.filter(s => s.category === currentCategory);
  }

  function renderCategories() {
    categoryListEl.innerHTML = "";
    CATEGORIES.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "category-btn" + (cat === currentCategory ? " active" : "");
      btn.textContent = cat;
      btn.addEventListener("click", () => {
        if (currentCategory !== cat) {
          currentCategory = cat;
          currentPage = 1;
          renderCategories();
          renderSongList();
        }
        categoryListEl.classList.add("hidden");
      });
      categoryListEl.appendChild(btn);
    });
    currentCategoryLabel.textContent = currentCategory;
  }

  hamburgerBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    categoryListEl.classList.toggle("hidden");
  });

  document.addEventListener("click", (e) => {
    if (!categoryListEl.contains(e.target) && e.target !== hamburgerBtn) {
      categoryListEl.classList.add("hidden");
    }
  });

  function renderSongList() {
    songListEl.innerHTML = "";
    const filtered = getFilteredSongs();
    const totalPages = Math.max(1, Math.ceil(filtered.length / SONGS_PER_PAGE));
    if (currentPage > totalPages) currentPage = totalPages;

    const start = (currentPage - 1) * SONGS_PER_PAGE;
    const pageSongs = filtered.slice(start, start + SONGS_PER_PAGE);

    if (pageSongs.length === 0) {
      const empty = document.createElement("p");
      empty.className = "footnote";
      empty.style.marginTop = "0";
      empty.textContent = "這個類別還沒有歌曲。";
      songListEl.appendChild(empty);
    }

    pageSongs.forEach((song) => {
      const realIndex = songs.indexOf(song);
      const btn = document.createElement("button");
      btn.className = "song-item";
      btn.innerHTML = `
        <span class="dot"></span>
        <span class="song-title">${song.title}</span>
        <span class="play-hint">播放 →</span>
      `;
      btn.addEventListener("click", () => openSong(realIndex));
      songListEl.appendChild(btn);
    });

    renderPagination(totalPages);
  }

  function renderPagination(totalPages) {
    paginationEl.innerHTML = "";
    if (totalPages <= 1) return;

    const prevBtn = document.createElement("button");
    prevBtn.className = "page-btn";
    prevBtn.textContent = "← 上一頁";
    prevBtn.disabled = currentPage === 1;
    prevBtn.addEventListener("click", () => {
      if (currentPage > 1) {
        currentPage -= 1;
        renderSongList();
      }
    });

    const indicator = document.createElement("span");
    indicator.className = "page-indicator";
    indicator.textContent = `${currentPage} / ${totalPages}`;

    const nextBtn = document.createElement("button");
    nextBtn.className = "page-btn";
    nextBtn.textContent = "下一頁 →";
    nextBtn.disabled = currentPage === totalPages;
    nextBtn.addEventListener("click", () => {
      if (currentPage < totalPages) {
        currentPage += 1;
        renderSongList();
      }
    });

    paginationEl.appendChild(prevBtn);
    paginationEl.appendChild(indicator);
    paginationEl.appendChild(nextBtn);
  }

  function openSong(index) {
    const song = songs[index];
    detailTitleEl.textContent = song.title;
    playerFrame.src = `https://drive.google.com/file/d/${song.driveId}/preview`;

    lyricsEl.innerHTML = "";
    song.sections.forEach(sec => {
      const block = document.createElement("div");
      if (sec.tag) {
        const tag = document.createElement("div");
        tag.className = "section-tag";
        tag.textContent = `[${sec.tag}]`;
        block.appendChild(tag);
      }

      sec.lines.forEach(line => {
        if (line === "") {
          const gap = document.createElement("div");
          gap.className = "lyric-gap";
          block.appendChild(gap);
        } else {
          const p = document.createElement("p");
          p.className = "lyric-line";
          p.textContent = line;
          block.appendChild(p);
        }
      });
      lyricsEl.appendChild(block);
    });

    homeScreen.style.display = "none";
    detailScreen.style.display = "block";
    window.scrollTo(0, 0);
  }

  backBtn.addEventListener("click", () => {
    playerFrame.src = "";
    detailScreen.style.display = "none";
    homeScreen.style.display = "block";
    window.scrollTo(0, 0);
  });

  renderCategories();
  renderSongList();
</script>
